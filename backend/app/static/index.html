<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QNA RAG System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🚀 QNA RAG System</h1>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span class="theme-icon">🌙</span>
            </button>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Panel - Document Upload -->
            <div class="left-panel">
                <div class="upload-section">
                    <h2>📄 Upload Documents</h2>
                    
                    <!-- Drag & Drop Area -->
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-content">
                            <div class="upload-icon">📁</div>
                            <p>Drag & drop files here</p>
                            <span>or</span>
                            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                                Choose Files
                            </button>
                            <input type="file" id="fileInput" multiple accept=".pdf,.docx,.txt" style="display: none;">
                        </div>
                    </div>

                    <!-- Upload Progress -->
                    <div class="upload-progress" id="uploadProgress" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <span class="progress-text" id="progressText">Uploading...</span>
                    </div>
                </div>

                <!-- Document List -->
                <div class="document-list">
                    <h3>📚 Uploaded Documents</h3>
                    <div class="documents" id="documentsList">
                        <div class="no-documents">No documents uploaded yet</div>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Chat Interface -->
            <div class="right-panel">
                <div class="chat-header">
                    <h2>💬 Ask Questions</h2>
                    <button class="clear-chat" onclick="clearChat()">Clear Chat</button>
                </div>

                <!-- Chat Messages -->
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <div class="ai-bubble">
                            <div class="bubble-content">
                                <p>👋 Welcome! Upload some documents and ask me questions about them.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Chat Input -->
                <div class="chat-input-container">
                    <div class="chat-input">
                        <textarea 
                            id="messageInput" 
                            placeholder="Ask a question about your documents..."
                            rows="1"
                            onkeypress="handleKeyPress(event)"
                        ></textarea>
                        <button class="send-btn" onclick="sendMessage()">
                            <span>➤</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
